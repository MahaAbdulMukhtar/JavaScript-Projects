<!DOCTYPE html>
<html>
    <head>
        <script src="script.js"></script>
        <link rel="stylesheet" href="style.css">
        <title>Simple Interest Calculator</title>
    </head>
    <body>
        <div class="maindiv">
            <h1>Simple Interest Calculator</h1>
            <p class="subtitle">
            Calculate your investment growth instantly
            </p>

            <div class="input-group">
                <label for="">Amount</label>
                <input type="number"  id="principal" placeholder="Enter amount">  <br/>
            </div>

            <div class="input-group rate">
                <label for="">Rate (%)</label>
                <input type="range"  id="rate" min="1" max="20" value="10.25" step="0.25" oninput="updateRate()">  <br/>

                <p class="rate-display">
                    <span id="rate_val">10.25</span>
                </p>
            </div>

            <div class="input-group">
               <label for="">No. of Years</label>
               <input type="number"  id="years" list="all_years" placeholder="Enter years">
                <datalist id="all_years">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                </datalist>  
                <br/>
            </div>

        <!-- Interest : <span id="result"></span><br> -->

        <button onclick="compute()">Compute Interest</button> 
        <button onclick="resetForm()">Clear</button>
        <div id="result" class="result-card"></div>
        <footer>
            &#169; 2026 Maha. All Rights Reserved.
        </footer>
        
    </body>
</html>
